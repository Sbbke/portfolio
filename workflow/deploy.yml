name: Build and Deploy to External Repo

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: 20
          cache: 'npm'

      - name: Install and Build
        run: |
          npm install
          npm run build
          
      - name: Deploy to Repo B
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository-name: Sbbke/Sbbke.github.io # Replace with your target repo
          branch: master # The branch in Repo B for hosting
          folder: build # The folder the build step generated
          clean: true
